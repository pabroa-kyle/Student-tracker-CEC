<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Member Dashboard</h1>
        <button id="logoutBtn" class="btn-logout">Logout</button>
    </header>

    <section>
        <h2>My Tasks</h2>
        <table id="studentTaskTable">
            <thead>
                <tr>
                    <th>Task</th>
                    <th>Deadline</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Student tasks will appear here -->
            </tbody>
        </table>
    </section>

    <script src="script.js"></script>
</body>
</html>
